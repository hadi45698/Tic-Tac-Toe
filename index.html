<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadi Tic Tac Toe</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(-45deg,#ffffff,#cce7ff,#66b3ff,#ffffff);
background-size:400% 400%;
animation:bg 8s ease infinite;
transition:0.5s;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.dark{
background:#121212;
color:white;
}

h1{
margin-bottom:15px;
color:#007bff;
}

.controls{
margin-bottom:15px;
display: flex;
gap: 10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
font-weight:bold;
transition: 0.2s;
}

button:hover{
opacity:0.9;
transform: scale(1.05);
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:8px;
}

.cell{
width:100px;
height:100px;
background:white;
border:2px solid #007bff;
display:flex;
justify-content:center;
align-items:center;
font-size:2rem;
font-weight:bold;
cursor:pointer;
border-radius:10px;
transition: 0.2s;
}

.cell:hover {
background: #f0f7ff;
}

.dark .cell{
background:#222;
color:white;
border-color: #007bff;
}

.dark .cell:hover {
background: #333;
}

#status{
margin:15px;
font-size:20px;
font-weight:bold;
}

footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:12px;
background:#007bff;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Tic Tac Toe 🤖</h1>

<div class="controls">
<button onclick="toggleTheme()">🌙 Theme</button>
<button onclick="resetGame()" style="background: #28a745;">🔄 Reset</button>
</div>

<div id="status">Your Turn (X)</div>

<div class="board" id="board">
<div class="cell" onclick="move(0)"></div>
<div class="cell" onclick="move(1)"></div>
<div class="cell" onclick="move(2)"></div>
<div class="cell" onclick="move(3)"></div>
<div class="cell" onclick="move(4)"></div>
<div class="cell" onclick="move(5)"></div>
<div class="cell" onclick="move(6)"></div>
<div class="cell" onclick="move(7)"></div>
<div class="cell" onclick="move(8)"></div>
</div>

<footer>
Made with ❤️ by Hadi
</footer>

<script>
let board = ["","","","","","","","",""];
let gameOver = false;

const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");

function move(index){
if(board[index] !== "" || gameOver) return;

board[index] = "X";
cells[index].textContent = "X";
cells[index].style.color = "#007bff"; // X ka color blue

if(checkWinner("X")){
statusText.textContent = "🎉 You Win!";
gameOver = true;
celebrate(); // Atish bazi wala function call kiya
return;
}

if(board.every(cell => cell !== "")){
statusText.textContent = "🤝 Draw!";
gameOver = true;
return;
}

statusText.textContent = "🤖 Robot Thinking...";

setTimeout(robotMove,500);
}

function robotMove(){
if(gameOver) return;
let empty = [];

for(let i=0;i<board.length;i++){
if(board[i] === "") empty.push(i);
}

if(empty.length === 0) return;

let randomIndex = empty[Math.floor(Math.random()*empty.length)];

board[randomIndex] = "O";
cells[randomIndex].textContent = "O";
cells[randomIndex].style.color = "#dc3545"; // Robot (O) ka color red

if(checkWinner("O")){
statusText.textContent = "🤖 Robot Wins!";
gameOver = true;
return;
}

if(board.every(cell => cell !== "")){
statusText.textContent = "🤝 Draw!";
gameOver = true;
return;
}

statusText.textContent = "Your Turn (X)";
}

function checkWinner(player){
const wins = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

return wins.some(comb =>
comb.every(index => board[index] === player)
);
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

// Shandar Atish Bazi (Fireworks) ka function
function celebrate() {
    var duration = 3 * 1000;
    var end = Date.now() + duration;

    (function frame() {
        // Left side se patakha
        confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0, y: 0.8 }
        });
        // Right side se patakha
        confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1, y: 0.8 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    }());
}

// Game reset karne ke liye function
function resetGame(){
    board = ["","","","","","","","",""];
    gameOver = false;
    statusText.textContent = "Your Turn (X)";
    cells.forEach(cell => {
        cell.textContent = "";
    });
}
</script>

</body>
</html>
